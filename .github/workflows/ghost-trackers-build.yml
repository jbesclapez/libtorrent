name: GhostTrackers Build

on:
  push:
    branches: [ GhostTrackers ]
  pull_request:
    branches: [ GhostTrackers ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout GhostTrackers branch
      uses: actions/checkout@v4
      with:
        ref: GhostTrackers
        submodules: true

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-boost
          mingw-w64-x86_64-openssl

    - name: Clean and create directories
      shell: msys2 {0}
      run: |
        rm -rf build install
        mkdir -p build install

    - name: Configure with CMake
      shell: msys2 {0}
      working-directory: build
      run: |
        cmake .. -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

    - name: Build with Ninja
      shell: msys2 {0}
      working-directory: build
      run: |
        ninja -j$(nproc)

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: libtorrent-ghosttrackers
        path: |
          build/
          install/ 